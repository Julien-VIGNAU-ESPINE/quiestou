<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qui vient de chez toi ? - France Notable People</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts for Modern Feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="map"></div>

<div class="overlay">
    <div class="header-box">
        <h1>Qui vient de chez toi ?</h1>
        <p>Découvrez les personnalités du monde entier les plus notables nées près de chez vous, basé sur la notoriété Wikipédia.</p>
        
        <div class="search-box" style="margin-bottom: 20px; display: flex; gap: 8px;">
            <input type="text" id="searchInput" placeholder="Rechercher une personne ou ville..." style="flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; outline: none; font-family: 'Outfit';">
            <button id="searchBtn" style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--accent); color: white; cursor: pointer; font-family: 'Outfit'; font-weight: 500;">Go</button>
        </div>
        
        <div class="filter-group">
            <button class="filter-btn active" data-category="All">Tous</button>
            <button class="filter-btn" data-category="Culture">Culture</button>
            <button class="filter-btn" data-category="Leadership">Leadership</button>
            <button class="filter-btn" data-category="Sports">Sports</button>
            <button class="filter-btn" data-category="Science">Science & Découverte</button>
        </div>
    </div>
</div>

<div id="wikiPanel" class="wiki-panel">
    <button id="closeWikiPanel" class="close-panel-btn">×</button>
    <div id="wikiPanelContent" class="wiki-panel-content">
        <!-- Content injected here -->
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
